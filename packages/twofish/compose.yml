# ─────────────────────────────────────────────────────────────────────────────
# Twofish WASM builder — Docker Compose
#
# Usage:
#   docker compose run --rm builder        ← compile once
#   docker compose run --rm builder watch  ← recompile on file changes (optional)
# ─────────────────────────────────────────────────────────────────────────────

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    volumes:
      - .:/src
    working_dir: /src
    command: bash build.sh
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"