# ─────────────────────────────────────────────────────────────────────────────
# Twofish WASM builder — Docker Compose
#
# Usage:
#   docker compose run --rm builder        ← compile once
#   docker compose run --rm builder watch  ← recompile on file changes (optional)
# ─────────────────────────────────────────────────────────────────────────────

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/src
    working_dir: /src
    command: bash build.sh